<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>pplog — 배변 기록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E8E9EE; --card:#FDFDFC; --ink:#28282D; --muted:#9C9CA6; --faint:#C9C9D2;
  --line:#EDEDF1; --brown:#A97C50; --brown-soft:#F2E9DF;
  --teal:#7FD1C9; --coral:#F2788F; --purple:#B9A7E8; --yellow:#F2CE6B;
  --radius:26px; --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink);
  display:flex; justify-content:center;
}
#app{
  width:100%; max-width:430px; min-height:100dvh;
  display:flex; flex-direction:column; position:relative;
}
/* ---------- header ---------- */
header{padding:28px 26px 10px}
.date-line{font:500 13px var(--mono); color:var(--muted); letter-spacing:.04em; display:flex; align-items:center; gap:6px}
.date-line .dot{width:6px;height:6px;border-radius:50%;background:var(--coral)}
h1.page-title{font-size:38px; font-weight:800; letter-spacing:-.03em; margin-top:2px}
h1.page-title .thin{font-weight:400; color:var(--muted)}
.greeting{color:var(--muted); font-size:14px; margin-top:6px; line-height:1.5}
.greeting b{color:var(--ink)}
/* ---------- card / timeline ---------- */
main{flex:1; padding:14px 14px 110px; overflow-y:auto}
.sheet{background:var(--card); border-radius:var(--radius); padding:26px 22px 30px;
  box-shadow:0 10px 40px rgba(40,40,60,.06)}
.timeline{position:relative; padding-left:14px}
.timeline::before{content:""; position:absolute; left:0; top:8px; bottom:8px;
  border-left:1.5px dashed var(--faint)}
.entry{position:relative; padding:0 0 26px 22px}
.entry:last-child{padding-bottom:4px}
.time-pill{
  position:relative; left:-37px; display:inline-block;
  font:500 11.5px var(--mono); color:var(--muted);
  border:1.2px dashed var(--faint); border-radius:999px;
  padding:4px 11px; background:var(--card); margin-bottom:10px;
}
.entry-body{margin-top:-2px}
.entry-title{font-weight:700; font-size:16px; display:flex; align-items:center; gap:8px}
.entry-title .status-dot{width:8px;height:8px;border-radius:50%}
.entry-meta{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px}
.tag{font-size:12px; padding:4px 10px; border-radius:999px; background:#F3F3F6; color:#63636D}
.tag.warn{background:#FCE9ED; color:#C95672}
.tag.dur{font-family:var(--mono); background:var(--brown-soft); color:var(--brown)}
.entry-note{margin-top:9px; font-size:14px; color:#55555E; line-height:1.6}
.entry-actions{margin-top:8px}
.entry-actions button{border:0;background:none;font-size:12px;color:var(--faint);cursor:pointer;padding:2px 4px}
.entry-actions button:hover{color:var(--coral)}
.empty{color:var(--muted); text-align:center; padding:46px 10px; font-size:14px; line-height:1.8}
.empty .big{font-size:34px; display:block; margin-bottom:8px}
/* ---------- timer ---------- */
.timer-wrap{display:flex; flex-direction:column; align-items:center; padding:34px 0 10px}
.timer-ring{
  width:218px;height:218px;border-radius:50%;
  border:1.5px dashed var(--faint);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.timer-ring::after{content:"";position:absolute;inset:14px;border-radius:50%;
  background:var(--card); box-shadow:0 12px 34px rgba(40,40,60,.08)}
.timer-ring.running::before{content:"";position:absolute;inset:-1.5px;border-radius:50%;
  border:1.5px solid var(--brown); clip-path:inset(0 0 0 50%); animation:spin 2.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.timer-ring.running::before{animation:none}}
.timer-num{position:relative;z-index:1;font:500 42px var(--mono);letter-spacing:.02em}
.timer-hint{margin-top:20px;font-size:13px;color:var(--muted);text-align:center;line-height:1.7;min-height:40px;padding:0 20px}
.timer-hint.alert{color:#C95672}
.timer-btns{display:flex;gap:10px;margin-top:14px}
/* ---------- buttons ---------- */
.btn{border:0;cursor:pointer;font-family:inherit;font-weight:700;font-size:15px;
  padding:14px 26px;border-radius:999px;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-dark{background:var(--ink);color:#fff}
.btn-ghost{background:#F0F0F4;color:var(--ink)}
.btn-brown{background:var(--brown);color:#fff}
/* ---------- calendar ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-head .month{font-size:22px;font-weight:800;letter-spacing:-.02em}
.cal-nav{display:flex;gap:4px}
.cal-nav button{border:0;background:none;font-size:18px;color:var(--muted);cursor:pointer;padding:4px 10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:8px;text-align:center}
.cal-grid .dow{font:500 11px var(--mono);color:var(--muted);padding-bottom:6px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:14px;border-radius:50%;cursor:pointer;position:relative;border:1.5px solid transparent}
.cal-day.dim{color:var(--faint);pointer-events:none}
.cal-day.today{border-color:var(--ink)}
.cal-day.sel{background:var(--ink);color:#fff}
.cal-day .mark{width:5px;height:5px;border-radius:50%;background:var(--brown);position:absolute;bottom:5px}
.cal-day.sel .mark{background:#fff}
.day-list{margin-top:22px;border-top:1px solid var(--line);padding-top:18px}
.day-list h3{font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.05em;margin-bottom:14px}
/* ---------- stats ---------- */
.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:#F6F6F8;border-radius:18px;padding:16px}
.stat-card .lbl{font-size:12px;color:var(--muted)}
.stat-card .val{font:500 24px var(--mono);margin-top:6px}
.stat-card .val small{font-size:13px;color:var(--muted);font-family:inherit}
.bars{display:flex;align-items:flex-end;gap:8px;height:110px;margin-top:18px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:26px;border-radius:8px;background:var(--brown-soft);min-height:4px;transition:height .3s}
.bar.hot{background:var(--brown)}
.bar-col .d{font:400 10.5px var(--mono);color:var(--muted)}
.section-title{font-size:15px;font-weight:700;margin:26px 0 4px}
.sub{font-size:12.5px;color:var(--muted);line-height:1.6}
/* ---------- bottom nav ---------- */
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;background:var(--card);
  border-radius:26px 26px 0 0;box-shadow:0 -8px 30px rgba(40,40,60,.07);
  display:flex;justify-content:space-around;align-items:center;
  padding:12px 8px calc(14px + env(safe-area-inset-bottom));z-index:20;
}
nav button{border:0;background:none;cursor:pointer;color:var(--faint);padding:8px 14px;border-radius:14px}
nav button.on{color:var(--ink)}
nav svg{width:22px;height:22px;display:block}
nav .add-btn{background:var(--ink);color:#fff;width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin-top:-4px}
/* ---------- modal (bottom sheet) ---------- */
.overlay{position:fixed;inset:0;background:rgba(30,30,40,.35);z-index:40;
  display:none;justify-content:center;align-items:flex-end}
.overlay.show{display:flex}
.modal{width:100%;max-width:430px;background:var(--card);border-radius:28px 28px 0 0;
  max-height:88dvh;overflow-y:auto;padding:14px 24px calc(28px + env(safe-area-inset-bottom))}
.grabber{width:44px;height:4px;border-radius:99px;background:var(--faint);margin:4px auto 18px}
.modal h2{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.modal .sub{margin-bottom:16px}
.field{margin-top:18px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:9px;letter-spacing:.03em}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1.5px solid var(--line);background:none;border-radius:999px;padding:8px 14px;
  font-size:13.5px;font-family:inherit;cursor:pointer;color:#55555E}
.chip.on{border-color:var(--ink);background:var(--ink);color:#fff}
.chip .em{margin-right:4px}
input[type=datetime-local],input[type=number],textarea{
  width:100%;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;
  font-family:inherit;font-size:14.5px;background:none;color:var(--ink)}
textarea{resize:none;min-height:76px;line-height:1.6}
input:focus,textarea:focus,.chip:focus-visible,button:focus-visible{outline:2px solid var(--brown);outline-offset:1px}
.modal-actions{display:flex;gap:10px;margin-top:26px}
.modal-actions .btn{flex:1}
/* ---------- settings ---------- */
.set-row{display:flex;justify-content:space-between;align-items:center;padding:16px 2px;border-bottom:1px solid var(--line)}
.set-row:last-child{border:0}
.set-row .t{font-size:14.5px;font-weight:600}
.set-row .d{font-size:12px;color:var(--muted);margin-top:3px}
.set-row .btn{padding:9px 16px;font-size:13px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:13.5px;padding:11px 20px;border-radius:999px;
  z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.view{display:none}.view.on{display:block}
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="main"></main>

  <nav>
    <button data-nav="today" class="on" aria-label="오늘">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
    </button>
    <button data-nav="cal" aria-label="캘린더">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
    </button>
    <button class="add-btn" data-nav="timer" aria-label="타이머 / 기록 추가">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="7"/><path d="M12 13V9M10 3h4"/></svg>
    </button>
    <button data-nav="stats" aria-label="통계">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
    </button>
    <button data-nav="set" aria-label="설정">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M4 12h10M4 17h13"/></svg>
    </button>
  </nav>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
/* ================= pplog ================= */
/* storage: localStorage 사용, 불가능한 환경(미리보기 등)에서는 메모리로 대체 */
const mem = {};
const store = {
  get(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return mem[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ mem[k]=v; } }
};

let logs = store.get('pplog') || []; // {id, ts, amount, shape, feel, pain, dur, note}
let view = 'today';
let selDate = null;                  // 캘린더에서 선택한 날짜(YYYY-MM-DD)
let calCursor = new Date();          // 캘린더가 보여주는 달
let timer = { running:false, start:0, elapsed:0, iv:null };

const AMOUNT = ['소','중','대'];
const SHAPES = [
  ['1','🥜 토끼똥 (매우 딱딱)'], ['2','🍇 딱딱한 소시지'], ['3','🥖 갈라진 소시지'],
  ['4','🍌 매끈한 바나나 (이상적)'], ['5','🍦 부드러운 덩어리'], ['6','🥣 죽 같은 변'], ['7','💧 물설사']
];
const FEEL = ['없음','약간','있음'];
const PAIN = ['없음','있음'];
const DOT = { '1':'var(--coral)','2':'var(--coral)','3':'var(--yellow)','4':'var(--teal)','5':'var(--teal)','6':'var(--yellow)','7':'var(--coral)' };

/* ---------- utils ---------- */
const $ = s => document.querySelector(s);
const pad = n => String(n).padStart(2,'0');
const dkey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fmtTime = ts => { const d=new Date(ts); const h=d.getHours(); return `${h<12?'오전':'오후'} ${((h+11)%12)+1}:${pad(d.getMinutes())}`; };
const fmtDur = s => s>=60 ? `${Math.floor(s/60)}분 ${s%60?s%60+'초':''}`.trim() : `${s}초`;
const esc = t => t.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const save = () => store.set('pplog', logs);
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------- render ---------- */
function render(){
  document.querySelectorAll('nav [data-nav]').forEach(b=>b.classList.toggle('on', b.dataset.nav===view));
  ({today:renderToday, cal:renderCal, timer:renderTimer, stats:renderStats, set:renderSet})[view]();
}

function entryHTML(l){
  const shape = SHAPES.find(s=>s[0]===l.shape);
  return `
  <div class="entry">
    <span class="time-pill">${fmtTime(l.ts)}</span>
    <div class="entry-body">
      <div class="entry-title"><span class="status-dot" style="background:${DOT[l.shape]||'var(--teal)'}"></span>배변 기록</div>
      <div class="entry-meta">
        <span class="tag">양 ${l.amount}</span>
        ${shape?`<span class="tag">${shape[1].split(' (')[0]}</span>`:''}
        ${l.feel!=='없음'?`<span class="tag warn">잔변감 ${l.feel}</span>`:''}
        ${l.pain==='있음'?`<span class="tag warn">통증</span>`:''}
        ${l.dur?`<span class="tag dur">⏱ ${fmtDur(l.dur)}</span>`:''}
      </div>
      ${l.note?`<div class="entry-note">${esc(l.note)}</div>`:''}
      <div class="entry-actions"><button onclick="delLog('${l.id}')">삭제</button></div>
    </div>
  </div>`;
}

function renderToday(){
  const today = dkey(new Date());
  const list = logs.filter(l=>dkey(new Date(l.ts))===today).sort((a,b)=>a.ts-b.ts);
  const d = new Date();
  $('#header').innerHTML = `
    <div class="date-line">${d.getFullYear()}. ${pad(d.getMonth()+1)}. ${pad(d.getDate())} <span class="dot"></span></div>
    <h1 class="page-title">Today<span class="thin"> · pplog</span></h1>
    <div class="greeting">오늘 <b>${list.length}회</b> 기록했어요${streak()>1?` · 🔥 ${streak()}일 연속`:''}</div>`;
  $('#main').innerHTML = `
    <div class="sheet">
      ${list.length
        ? `<div class="timeline">${list.map(entryHTML).join('')}</div>`
        : `<div class="empty"><span class="big">🧻</span>아직 오늘 기록이 없어요.<br>가운데 타이머 버튼으로 시작해 보세요.</div>`}
      <div style="text-align:center;margin-top:22px">
        <button class="btn btn-ghost" onclick="openForm()">+ 직접 기록 추가</button>
      </div>
    </div>`;
}

/* ---------- timer ---------- */
function renderTimer(){
  $('#header').innerHTML = `
    <div class="date-line">TIMER</div>
    <h1 class="page-title">배변 타이머</h1>
    <div class="greeting">앉는 순간 시작하고, 끝나면 정지 — 시간이 기록에 자동으로 들어가요.</div>`;
  $('#main').innerHTML = `
    <div class="sheet">
      <div class="timer-wrap">
        <div class="timer-ring ${timer.running?'running':''}" id="ring">
          <div class="timer-num" id="tnum">${tstr()}</div>
        </div>
        <div class="timer-hint" id="thint">${hint()}</div>
        <div class="timer-btns" id="tbtns">${btns()}</div>
      </div>
    </div>`;
}
const tstr = () => { const s = Math.floor(elapsed()/1000); return `${pad(Math.floor(s/60))}:${pad(s%60)}`; };
const elapsed = () => timer.running ? timer.elapsed + (Date.now()-timer.start) : timer.elapsed;
function hint(){
  const m = elapsed()/60000;
  if(m >= 10) return `<span class="alert">⚠️ 10분이 넘었어요. 오래 앉아 있으면 치질 위험이 높아져요.<br>오늘은 여기까지 하고 일어나는 걸 추천해요.</span>`;
  if(timer.running) return '스마트폰은 잠시 내려놓는 게 좋아요 🙂';
  if(timer.elapsed) return '일시정지됨 — 저장하면 기록 폼이 열려요.';
  return '권장 배변 시간은 5~10분 이내예요.';
}
function btns(){
  if(timer.running) return `<button class="btn btn-ghost" onclick="pauseT()">일시정지</button><button class="btn btn-dark" onclick="stopT()">정지 & 기록</button>`;
  if(timer.elapsed) return `<button class="btn btn-ghost" onclick="startT()">계속</button><button class="btn btn-dark" onclick="stopT()">정지 & 기록</button><button class="btn btn-ghost" onclick="resetT()">리셋</button>`;
  return `<button class="btn btn-brown" onclick="startT()">시작</button>`;
}
function tick(){
  if(view!=='timer') return;
  const n=$('#tnum'), h=$('#thint');
  if(n) n.textContent = tstr();
  if(h) h.innerHTML = hint();
}
function startT(){ timer.running=true; timer.start=Date.now(); if(!timer.iv) timer.iv=setInterval(tick,500); renderTimer(); }
function pauseT(){ timer.elapsed=elapsed(); timer.running=false; renderTimer(); }
function stopT(){ const s=Math.round(elapsed()/1000); resetT(false); openForm(s||null); }
function resetT(re=true){ timer.running=false; timer.elapsed=0; clearInterval(timer.iv); timer.iv=null; if(re) renderTimer(); }

/* ---------- calendar ---------- */
function renderCal(){
  const y=calCursor.getFullYear(), m=calCursor.getMonth();
  $('#header').innerHTML = `
    <div class="date-line">CALENDAR</div>
    <h1 class="page-title">기록 달력</h1>
    <div class="greeting">점이 찍힌 날 = 기록이 있는 날이에요.</div>`;
  const first = new Date(y,m,1), startDow=first.getDay(), days=new Date(y,m+1,0).getDate();
  const marked = new Set(logs.map(l=>dkey(new Date(l.ts))));
  const todayK = dkey(new Date());
  let cells = ['일','월','화','수','목','금','토'].map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) cells += `<div class="cal-day dim"></div>`;
  for(let d=1;d<=days;d++){
    const k = `${y}-${pad(m+1)}-${pad(d)}`;
    cells += `<div class="cal-day ${k===todayK?'today':''} ${k===selDate?'sel':''}" onclick="pickDay('${k}')">${d}${marked.has(k)?'<span class="mark"></span>':''}</div>`;
  }
  const dayLogs = selDate ? logs.filter(l=>dkey(new Date(l.ts))===selDate).sort((a,b)=>a.ts-b.ts) : [];
  $('#main').innerHTML = `
    <div class="sheet">
      <div class="cal-head">
        <div class="month">${y}년 ${m+1}월</div>
        <div class="cal-nav">
          <button onclick="moveCal(-1)" aria-label="이전 달">‹</button>
          <button onclick="moveCal(1)" aria-label="다음 달">›</button>
        </div>
      </div>
      <div class="cal-grid">${cells}</div>
      ${selDate?`<div class="day-list"><h3>${selDate.replaceAll('-','. ')} · ${dayLogs.length}회</h3>
        ${dayLogs.length?`<div class="timeline">${dayLogs.map(entryHTML).join('')}</div>`:'<div class="sub">이 날은 기록이 없어요.</div>'}</div>`:''}
    </div>`;
}
function moveCal(d){ calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth()+d, 1); selDate=null; renderCal(); }
function pickDay(k){ selDate = selDate===k ? null : k; renderCal(); }

/* ---------- stats ---------- */
function streak(){
  const set = new Set(logs.map(l=>dkey(new Date(l.ts))));
  let n=0, d=new Date();
  if(!set.has(dkey(d))) d.setDate(d.getDate()-1); // 오늘 아직 없으면 어제부터
  while(set.has(dkey(d))){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function renderStats(){
  $('#header').innerHTML = `
    <div class="date-line">STATS</div>
    <h1 class="page-title">이번 주 통계</h1>
    <div class="greeting">최근 7일 기준으로 계산해요.</div>`;
  const now = new Date();
  const week = [...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(now.getDate()-(6-i)); return d; });
  const counts = week.map(d => logs.filter(l=>dkey(new Date(l.ts))===dkey(d)).length);
  const wlogs = logs.filter(l => (now - new Date(l.ts)) < 7*864e5);
  const durs = wlogs.filter(l=>l.dur).map(l=>l.dur);
  const avgDur = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length) : 0;
  const feelPct = wlogs.length ? Math.round(wlogs.filter(l=>l.feel!=='없음').length/wlogs.length*100) : 0;
  const ideal = wlogs.length ? Math.round(wlogs.filter(l=>l.shape==='4').length/wlogs.length*100) : 0;
  const max = Math.max(...counts, 1);
  const dows = ['일','월','화','수','목','금','토'];
  $('#main').innerHTML = `
    <div class="sheet">
      <div class="stat-cards">
        <div class="stat-card"><div class="lbl">주간 횟수</div><div class="val">${wlogs.length}<small>회</small></div></div>
        <div class="stat-card"><div class="lbl">연속 기록</div><div class="val">${streak()}<small>일</small></div></div>
        <div class="stat-card"><div class="lbl">평균 소요시간</div><div class="val">${avgDur?fmtDur(avgDur):'–'}</div></div>
        <div class="stat-card"><div class="lbl">잔변감 비율</div><div class="val">${feelPct}<small>%</small></div></div>
      </div>
      <div class="section-title">요일별 횟수</div>
      <div class="bars">${counts.map((c,i)=>`
        <div class="bar-col">
          <div class="bar ${i===6?'hot':''}" style="height:${c/max*100}%"></div>
          <div class="d">${dows[week[i].getDay()]}</div>
        </div>`).join('')}
      </div>
      <div class="section-title">형태 건강도</div>
      <div class="sub">이번 주 기록 중 <b>${ideal}%</b>가 이상적인 형태(4번 바나나형)였어요.
      ${feelPct>=50?'<br>잔변감이 잦아요 — 수분·식이섬유 섭취를 늘려보세요.':''}
      ${avgDur>600?'<br>평균 배변 시간이 10분을 넘어요. 너무 오래 앉아 있지 않도록 주의!':''}</div>
    </div>`;
}

/* ---------- settings ---------- */
function renderSet(){
  $('#header').innerHTML = `
    <div class="date-line">SETTINGS</div>
    <h1 class="page-title">데이터 관리</h1>
    <div class="greeting">모든 데이터는 이 기기 브라우저에만 저장돼요.</div>`;
  $('#main').innerHTML = `
    <div class="sheet">
      <div class="set-row"><div><div class="t">JSON 내보내기</div><div class="d">전체 기록을 파일로 백업해요</div></div>
        <button class="btn btn-ghost" onclick="exportJSON()">내보내기</button></div>
      <div class="set-row"><div><div class="t">JSON 가져오기</div><div class="d">백업 파일에서 복원해요</div></div>
        <button class="btn btn-ghost" onclick="$('#imp').click()">가져오기</button>
        <input type="file" id="imp" accept=".json" hidden onchange="importJSON(this)"></div>
      <div class="set-row"><div><div class="t">전체 삭제</div><div class="d">되돌릴 수 없어요</div></div>
        <button class="btn btn-ghost" style="color:#C95672" onclick="wipe()">삭제</button></div>
    </div>`;
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(logs,null,2)],{type:'application/json'});
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`pplog-${dkey(new Date())}.json`});
  a.click(); URL.revokeObjectURL(a.href);
}
function importJSON(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => { try{
    const data = JSON.parse(r.result);
    if(!Array.isArray(data)) throw 0;
    logs = data; save(); toast('가져오기 완료'); render();
  }catch(e){ toast('올바른 pplog 백업 파일이 아니에요'); } };
  r.readAsText(f); inp.value='';
}
function wipe(){ if(confirm('모든 기록을 삭제할까요? 되돌릴 수 없어요.')){ logs=[]; save(); toast('삭제 완료'); render(); } }

/* ---------- add form ---------- */
const form = { amount:'중', shape:'4', feel:'없음', pain:'없음' };
function openForm(dur=null){
  const d = new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
  Object.assign(form,{amount:'중',shape:'4',feel:'없음',pain:'없음'});
  $('#modal').innerHTML = `
    <div class="grabber"></div>
    <h2>배변 기록</h2>
    <div class="sub">${dur?`타이머 측정: <b>${fmtDur(dur)}</b>`:'해당하는 항목을 골라주세요.'}</div>
    <div class="field"><label>시간</label><input type="datetime-local" id="f-ts" value="${d.toISOString().slice(0,16)}"></div>
    <div class="field"><label>양</label><div class="chips" id="c-amount">${AMOUNT.map(v=>chip('amount',v,v)).join('')}</div></div>
    <div class="field"><label>형태 (브리스톨 척도)</label><div class="chips" id="c-shape">${SHAPES.map(([k,t])=>chip('shape',k,t)).join('')}</div></div>
    <div class="field"><label>잔변감</label><div class="chips" id="c-feel">${FEEL.map(v=>chip('feel',v,v)).join('')}</div></div>
    <div class="field"><label>통증 / 출혈</label><div class="chips" id="c-pain">${PAIN.map(v=>chip('pain',v,v)).join('')}</div></div>
    <div class="field"><label>소요시간 (초)</label><input type="number" id="f-dur" min="0" placeholder="선택 입력" value="${dur??''}"></div>
    <div class="field"><label>메모</label><textarea id="f-note" placeholder="식사, 컨디션, 특이사항 등"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeForm()">취소</button>
      <button class="btn btn-dark" onclick="submitForm()">저장</button>
    </div>`;
  $('#overlay').classList.add('show');
}
const chip = (g,val,txt) => `<button class="chip ${form[g]===val?'on':''}" data-g="${g}" data-v="${val}" onclick="pick(this)">${txt}</button>`;
function pick(el){
  form[el.dataset.g] = el.dataset.v;
  el.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on', c===el));
}
function closeForm(){ $('#overlay').classList.remove('show'); }
function submitForm(){
  const ts = new Date($('#f-ts').value).getTime();
  if(!ts){ toast('시간을 확인해주세요'); return; }
  const dur = parseInt($('#f-dur').value)||null;
  logs.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    ts, amount:form.amount, shape:form.shape, feel:form.feel, pain:form.pain, dur, note:$('#f-note').value.trim() });
  save(); closeForm(); toast('기록 완료 💩'); view='today'; render();
}
function delLog(id){ if(confirm('이 기록을 삭제할까요?')){ logs = logs.filter(l=>l.id!==id); save(); render(); } }

/* ---------- nav & init ---------- */
document.querySelectorAll('nav [data-nav]').forEach(b=>b.addEventListener('click',()=>{ view=b.dataset.nav; render(); }));
$('#overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeForm(); });
render();


</script>
</body>
</html>
